{% extends 'base.html' %}

{% block title %}404 - Page Not Found{% endblock %}
{% block page_title %}Page Not Found{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <div class="flex justify-center mb-6">
            <div class="h-32 w-32 rounded-full bg-gray-100 flex items-center justify-center">
                <i class="fas fa-search text-6xl text-gray-400"></i>
            </div>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-4">404</h1>
        <p class="text-xl text-gray-600 mb-8">Oops! The page you're looking for doesn't exist.</p>
        <a href="{{ url_for('dashboard') }}" class="inline-flex items-center px-6 py-3 bg-primary-600 text-white rounded-xl 
                  hover:bg-primary-700 transition-colors font-semibold">
            <i class="fas fa-home mr-2"></i>
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
