<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LeadGen Pro</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: {
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                        },
                        fuchsia: {
                            400: '#e879f9',
                            500: '#d946ef',
                            600: '#c026d3',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Alpine.js for interactions -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a15;
            color: white;
            overflow: hidden;
        }

        .hero-title {
            font-family: 'Space Grotesk', sans-serif;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .lighting-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: blobFloat 10s ease-in-out infinite;
        }

        .lighting-blob-pink {
            background: radial-gradient(circle, rgba(236, 72, 153, 0.8) 0%, rgba(236, 72, 153, 0) 70%);
            width: 600px;
            height: 600px;
            top: -200px;
            left: -100px;
        }

        .lighting-blob-blue {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.7) 0%, rgba(59, 130, 246, 0) 70%);
            width: 500px;
            height: 500px;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes blobFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, 30px) scale(1.1);
            }
        }

        .gradient-text-pink {
            background: linear-gradient(135deg, #ec4899 0%, #d946ef 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-glow {
            background: linear-gradient(135deg, #ec4899 0%, #d946ef 50%, #8b5cf6 100%);
            background-size: 200% 200%;
            animation: btnGradient 3s ease infinite;
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
        }

        @keyframes btnGradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .input-glass {
            background: rgba(10, 10, 26, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: #ec4899;
            box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.2);
            outline: none;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center p-6">
    <!-- Background Elements -->
    <div class="lighting-blob lighting-blob-pink"></div>
    <div class="lighting-blob lighting-blob-blue"></div>
    <div id="particles-js"></div>

    <!-- Auth Container -->
    <div class="w-full max-w-md z-10 animate-fade-in" x-data="{ mode: 'login' }">
        <div class="text-center mb-10">
            <a href="/" class="inline-flex items-center space-x-3 mb-6 hover:scale-105 transition-transform">
                <div class="w-10 h-10 rounded-xl btn-glow flex items-center justify-center">
                    <i class="fas fa-rocket text-white"></i>
                </div>
                <span class="text-2xl font-bold hero-title">LeadGen<span class="gradient-text-pink">Pro</span></span>
            </a>
            <h1 class="text-3xl font-bold mb-2">
                <template x-if="mode === 'login'"><span>Welcome Back</span></template>
                <template x-if="mode === 'signup'"><span>Create Account</span></template>
            </h1>
            <p class="text-gray-400">Enter your details to continue</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 md:p-10 border border-white/10">
            <!-- Email/Password Form -->
            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email-input"
                            class="input-glass w-full rounded-2xl pl-11 pr-4 py-3.5 text-white placeholder-gray-600"
                            placeholder="name@company.com">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password-input"
                            class="input-glass w-full rounded-2xl pl-11 pr-4 py-3.5 text-white placeholder-gray-600"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button id="auth-submit-btn" type="submit"
                        class="btn-glow w-full py-4 rounded-2xl text-lg font-bold shadow-lg">
                        <template x-if="mode === 'login'"><span>Sign In</span></template>
                        <template x-if="mode === 'signup'"><span>Create Account</span></template>
                    </button>
                </div>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-8">
                <div class="flex-1 border-t border-white/10"></div>
                <span class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-widest">Or continue with</span>
                <div class="flex-1 border-t border-white/10"></div>
            </div>

            <!-- Social Login -->
            <div class="flex justify-center">
                <button id="google-auth-btn"
                    class="w-full py-4 rounded-2xl bg-[#1a1a4e] hover:bg-[#25256e] border border-white/10 flex items-center justify-center space-x-3 transition-all">
                    <svg class="w-6 h-6 text-white" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="currentColor"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="currentColor"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="currentColor"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span class="font-medium">Google Login</span>
                </button>
            </div>

            <!-- Toggle Mode -->
            <p class="text-center text-gray-400 mt-8 text-sm">
                <span x-show="mode === 'login'">Don't have an account?</span>
                <span x-show="mode === 'signup'">Already have an account?</span>
                <button @click="mode = mode === 'login' ? 'signup' : 'login'"
                    class="text-pink-500 font-bold hover:underline ml-1">
                    <span x-show="mode === 'login'">Sign Up</span>
                    <span x-show="mode === 'signup'">Sign In</span>
                </button>
            </p>
        </div>

        <!-- Back to Home -->
        <p class="text-center mt-10">
            <a href="/" class="text-gray-500 hover:text-white transition-colors text-sm">
                <i class="fas fa-arrow-left mr-2"></i>Back to home page
            </a>
        </p>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfINND2dF-OSsEmHqXemXo9euluh8Aoi4",
            authDomain: "lively-paratext-487716-r8.firebaseapp.com",
            projectId: "lively-paratext-487716-r8",
            storageBucket: "lively-paratext-487716-r8.firebasestorage.app",
            messagingSenderId: "1022135430610",
            appId: "1:1022135430610:web:a5cc7da0bc00efaac46c0b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        function handleFirebaseToken(idToken) {
            console.log("Sending token to backend...");
            return fetch('/auth/firebase-login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ idToken: idToken })
            })
                .then(async response => {
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        return response.json().then(data => ({ status: response.status, data }));
                    } else {
                        const text = await response.text();
                        throw new Error(`Server error (${response.status}).`);
                    }
                })
                .then(({ status, data }) => {
                    if (data.success) {
                        window.location.href = data.redirect;
                    } else {
                        alert('Login failed: ' + data.error);
                    }
                })
                .catch(error => {
                    alert("Authentication Error: " + error.message);
                });
        }

        // Handle Submit (Email/Password)
        document.getElementById('auth-submit-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            if (!email || !password) return alert("Please enter email and password");

            const btn = document.getElementById('auth-submit-btn');
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            // Simple way to check mode without hacky Alpine access
            const isSignup = btn.innerText.toLowerCase().includes('create');
            const authFunc = isSignup ? createUserWithEmailAndPassword : signInWithEmailAndPassword;

            authFunc(auth, email, password)
                .then(userCredential => userCredential.user.getIdToken())
                .then(handleFirebaseToken)
                .catch(error => {
                    console.error("Firebase Auth Error", error);
                    alert(error.message);
                })
                .finally(() => {
                    btn.innerHTML = orig;
                    btn.disabled = false;
                });
        });

        // Handle Google Login
        document.getElementById('google-auth-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const btn = document.getElementById('google-auth-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class=\"fas fa-spinner fa-spin\"></i>';
            btn.disabled = true;

            signInWithPopup(auth, provider)
                .then((result) => result.user.getIdToken())
                .then(idToken => handleFirebaseToken(idToken))
                .catch((error) => {
                    if (error.code !== 'auth/popup-closed-by-user') {
                        alert('Authentication Error: ' + error.message);
                    }
                })
                .finally(() => {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                });
        });
    </script>

    <!-- Particles Config -->
    <script>
        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: '#ec4899' },
                shape: { type: 'circle' },
                opacity: { value: 0.5, random: true },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: '#ec4899', opacity: 0.2, width: 1 },
                move: { enable: true, speed: 2, direction: 'none', random: true, straight: false, out_mode: 'out' }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'grab' }, onclick: { enable: true, mode: 'push' } },
                modes: { grab: { distance: 140, line_linked: { opacity: 1 } } }
            },
            retina_detect: true
        });
    </script>
</body>

</html>
