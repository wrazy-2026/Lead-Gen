{% extends 'base.html' %}

{% block title %}500 - Server Error{% endblock %}
{% block page_title %}Server Error{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <div class="flex justify-center mb-6">
            <div class="h-32 w-32 rounded-full bg-red-100 flex items-center justify-center">
                <i class="fas fa-exclamation-triangle text-6xl text-red-400"></i>
            </div>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-4">500</h1>
        <p class="text-xl text-gray-600 mb-8">Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('dashboard') }}" class="inline-flex items-center px-6 py-3 bg-primary-600 text-white rounded-xl 
                  hover:bg-primary-700 transition-colors font-semibold">
            <i class="fas fa-redo mr-2"></i>
            Try Again
        </a>
    </div>
</div>
{% endblock %}
