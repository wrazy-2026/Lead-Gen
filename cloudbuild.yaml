# Cloud Build configuration for Google Cloud Run with Cloud SQL
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/leadgen-dashboard', '.']
  
  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/leadgen-dashboard']
  
  # Deploy to Cloud Run with Cloud SQL connection
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'leadgen-dashboard'
      - '--image'
      - 'gcr.io/$PROJECT_ID/leadgen-dashboard'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--timeout'
      - '300'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_CONNECTION}'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DATABASE_URL},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET},SECRET_KEY=${_SECRET_KEY},ADMIN_EMAIL=${_ADMIN_EMAIL},SERPER_API_KEY=${_SERPER_API_KEY},APIFY_TOKEN=${_APIFY_TOKEN}'

substitutions:
  _CLOUD_SQL_CONNECTION: ''
  _DATABASE_URL: ''
  _GOOGLE_CLIENT_ID: ''
  _GOOGLE_CLIENT_SECRET: ''
  _SECRET_KEY: ''
  _ADMIN_EMAIL: ''
  _SERPER_API_KEY: ''
  _APIFY_TOKEN: ''

images:
  - 'gcr.io/$PROJECT_ID/leadgen-dashboard'

timeout: '1200s'
