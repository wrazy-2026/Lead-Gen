# DEPRECATED - This project now uses Google Cloud Run + Cloud SQL
# See GOOGLE_CLOUD_SETUP.md for deployment instructions
# This file is kept for reference only

# Old Render.com configuration (no longer used)
databases:
  - name: leadgen-db
    databaseName: leadgen
    user: leadgen
    plan: free  # Or starter for paid

services:
  - type: web
    name: lead-generation-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: gunicorn app_flask:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
      # PostgreSQL Database - REQUIRED for data persistence
      - key: DATABASE_URL
        fromDatabase:
          name: leadgen-db
          property: connectionString
      # Google OAuth Configuration
      - key: GOOGLE_CLIENT_ID
        sync: false  # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false  # Set manually in Render dashboard
      # Admin Configuration
      - key: ADMIN_EMAIL
        value: samadly728@gmail.com
